name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: build, vet, test
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit only — skip integration without DB)
        run: go test -short -race -count=1 ./...
        env:
          CGO_ENABLED: 1

  # ---------------------------------------------------------------------------
  # Frontend: install, build, test
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080
          PUBLIC_API_URL: http://localhost:8080

      - name: Test
        # Only run if a test script is defined in package.json
        run: |
          if node -e "require('./package.json').scripts.test" 2>/dev/null; then
            npm run test
          else
            echo "No test script found — skipping"
          fi

  # ---------------------------------------------------------------------------
  # Lint: golangci-lint (Go) + ESLint (frontend)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Go lint
      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

      # Frontend lint
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: ESLint
        working-directory: ./frontend
        run: |
          if node -e "require('./package.json').scripts.lint" 2>/dev/null; then
            npm run lint
          else
            echo "No lint script found — skipping ESLint"
          fi
